site_name: My Blog

site_url: https://maxwe11-g.github.io/myblog/

theme:
  name: material
  custom_dir: overrides

  palette:

    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
      primary: indigo
      accent: cyan

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
      primary: black
      accent: cyan

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - About: about.md
  - Posts:
      - First Post: posts/first-post.md
      - Second Post: posts/second-post.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/extra.js